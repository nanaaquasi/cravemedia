<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Craveo Extension Options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 24px;
      }
      h1 { font-size: 20px; }
      label { display: block; margin-bottom: 6px; font-weight: 500; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }
      button {
        margin-top: 16px;
        padding: 10px 20px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: #4f46e5; }
      .hint { font-size: 13px; color: #6b7280; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Craveo Extension Options</h1>
    <p class="hint">Configure the Craveo site URL. Leave blank to use the default.</p>
    <label for="app-url">Site URL</label>
    <input type="url" id="app-url" placeholder="https://your-site.vercel.app" />
    <button id="save">Save</button>
    <script type="module" src="options.ts"></script>
  </body>
</html>
